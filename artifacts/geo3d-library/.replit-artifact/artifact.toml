kind = "web"
previewPath = "/"
title = "Geo3D Library"
version = "1.0.0"
id = "artifacts/geo3d-library"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24812
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/geo3d-library run dev"

[services.env]
PORT = "24812"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/geo3d-library", "run", "build"]
publicDir = "artifacts/geo3d-library/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
